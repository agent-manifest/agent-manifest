<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="theme-color" content="#f5f4f0">

<meta property="og:image" content="https://agent-manifest-spec.org/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Agent Manifest social preview card.">
<meta name="twitter:image" content="https://agent-manifest-spec.org/og-image.png">
<meta name="twitter:description" content="{{ page.description | default: site.description | strip_newlines | escape }}">

<link rel="canonical" href="{{ page.url | absolute_url }}">
<meta property="og:type" content="{{ page.og_type | default: 'article' }}">
<meta property="og:title" content="{{ page.title | default: site.title | strip_newlines | escape }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_newlines | escape }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title | escape }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title | strip_newlines | escape }}">
